<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Tiles (Viz)</title>
<script src="tableau.extensions.1.latest.min.js"></script>
<style>
  :root{ --blue:#4E79A7; --blue-deep:#3B5E84; --ink:#2b2b2b; --muted:#7a7a7a; --line:#e6e6e6; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',Tahoma,sans-serif;color:var(--ink);background:#fff;display:flex;overflow:hidden}
  #stage{flex:1;position:relative;display:flex;min-height:0}
  #scroll{flex:1;overflow:auto;padding:12px;min-width:0}
  #grid{display:grid}
  #msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;background:#fff}
  .msg{text-align:center;color:var(--muted);font:400 13px 'Segoe UI';max-width:300px;line-height:1.55}
  .msg b{color:var(--ink);display:block;margin-bottom:6px;font:600 14px 'Segoe UI'}
  .msg .enc{color:var(--blue-deep);font-weight:600}
  .hide{display:none!important}

  .tile{position:relative;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .tile .lab{display:flex;align-items:center;gap:7px}
  .tile .ldot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .tile .num{line-height:1;font-weight:700}
  .tile .num .pre,.tile .num .suf{font-size:.5em;font-weight:600;opacity:.65}

  /* panel — full page inside the Configure dialog */
  body.dialog{display:block}
  body.dialog #stage{display:none}
  #panel{display:flex;flex-direction:column;height:100vh}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .phead h3{font:700 13px 'Segoe UI'}
  .phead .x{cursor:pointer;color:#999;font-size:18px;border:0;background:none}
  .pbody{overflow-y:auto;padding:4px 14px 18px;flex:1 1 auto}
  .grp{margin-top:13px}
  .grp h4{font:700 9.5px 'Segoe UI';letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;padding-bottom:4px;border-bottom:1px dashed var(--line)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;font:500 12px 'Segoe UI';color:#333}
  .row.col{flex-direction:column;align-items:stretch;gap:4px}
  .row input[type=range]{width:120px}
  .row input[type=number]{width:58px;font:500 12px 'Segoe UI';padding:4px 6px;border:1px solid #cfcfcf;border-radius:5px}
  .row input[type=text]{font:500 12px 'Segoe UI';padding:5px 7px;border:1px solid #cfcfcf;border-radius:5px;width:100%}
  .row input[type=color]{width:30px;height:22px;border:1px solid #cfcfcf;border-radius:5px;padding:0;background:#fff;cursor:pointer}
  .row select{max-width:150px;font:500 12px 'Segoe UI';padding:4px 6px;border:1px solid #cfcfcf;border-radius:5px;background:#fff;cursor:pointer}
  .sw{position:relative;width:34px;height:19px;flex:0 0 auto;cursor:pointer}
  .sw input{display:none}
  .sw i{position:absolute;inset:0;background:#d2d2d2;border-radius:999px;transition:background .16s}
  .sw i::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .16s}
  .sw input:checked + i{background:var(--blue)}
  .sw input:checked + i::after{transform:translateX(15px)}
  .muted{color:var(--muted);font-size:11px;font-weight:400}
  .styles{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
  .styt{border:1px solid var(--line);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font:600 11px 'Segoe UI';color:#555;background:#fff;transition:.12s}
  .styt:hover{border-color:var(--blue)}
  .styt.on{border-color:var(--blue);background:#eef3f8;color:var(--blue-deep);box-shadow:0 0 0 2px rgba(78,121,167,.15)}
  .styt .sw2{display:block;height:18px;border-radius:4px;margin-bottom:5px}
  .trow{border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:7px}
  .trow .th{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .trow .th .fn{font:600 11px 'Consolas',monospace;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .trow .tg{display:grid;grid-template-columns:1fr 52px 46px;gap:5px}
  .trow input{font:500 11px 'Segoe UI';padding:4px 6px;border:1px solid #d6d6d6;border-radius:4px;width:100%}
  .pfoot{flex:0 0 auto;padding:10px 14px;border-top:1px solid var(--line)}
  .pfoot button{width:100%;font:600 13px 'Segoe UI';color:#fff;background:var(--blue);border:0;border-radius:6px;padding:10px;cursor:pointer}
  .pfoot button:hover{background:var(--blue-deep)}
</style>
</head>
<body>
  <div id="stage">
    <div id="scroll"><div id="grid" class="hide"></div></div>
    <div id="msg"><div class="msg" id="msgText"><b>Loading…</b>Starting KPI tiles.</div></div>
  </div>

  <div id="panel">
    <div class="phead"><h3>KPI settings</h3><button class="x" id="pClose">&times;</button></div>
    <div class="pbody">
      <div class="grp"><h4>Style preset</h4><div class="styles" id="styles"></div></div>
      <div class="grp"><h4>Layout</h4>
        <label class="row">Columns <select id="kColumns"><option value="auto">Auto-fit</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select></label>
        <div class="row col"><span>Min tile width <span class="muted" id="kMinWV"></span></span><input type="range" id="kMinW" min="90" max="320" step="10"></div>
        <div class="row col"><span>Gap <span class="muted" id="kGapV"></span></span><input type="range" id="kGap" min="0" max="28" step="1"></div>
        <div class="row col"><span>Padding <span class="muted" id="kPaddingV"></span></span><input type="range" id="kPadding" min="6" max="30" step="1"></div>
        <div class="row col"><span>Corner radius <span class="muted" id="kRadiusV"></span></span><input type="range" id="kRadius" min="0" max="22" step="1"></div>
        <div class="row col"><span>Min height <span class="muted" id="kMinHV"></span></span><input type="range" id="kMinH" min="56" max="200" step="4"></div>
        <label class="row">Align <select id="kAlign"><option value="left">Left</option><option value="center">Center</option></select></label>
      </div>
      <div class="grp"><h4>Typography</h4>
        <label class="row">Font <select id="kFont">
          <option value="'Segoe UI', Tahoma, sans-serif">Segoe UI</option>
          <option value="'Benton Sans','Segoe UI',sans-serif">Benton Sans</option>
          <option value="Arial, Helvetica, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Tahoma, Geneva, sans-serif">Tahoma</option></select></label>
        <div class="row col"><span>Number size <span class="muted" id="kNumSizeV"></span></span><input type="range" id="kNumSize" min="16" max="60" step="1"></div>
        <div class="row col"><span>Label size <span class="muted" id="kLabelSizeV"></span></span><input type="range" id="kLabelSize" min="8" max="18" step="1"></div>
        <label class="row">Label case <select id="kLabelCase"><option value="upper">UPPERCASE</option><option value="none">As-is</option><option value="title">Title</option></select></label>
      </div>
      <div class="grp"><h4>Colours</h4>
        <label class="row">Number <input type="color" id="kNumColor"></label>
        <label class="row">Label <input type="color" id="kLabelColor"></label>
        <label class="row">Tile background <input type="color" id="kTileBg"></label>
        <label class="row">Border <input type="color" id="kBorder"></label>
        <label class="row">Default accent <input type="color" id="kAccent"></label>
        <label class="row">Accent style <select id="kAccentStyle"><option value="left">Left bar</option><option value="top">Top bar</option><option value="dot">Dot</option><option value="none">None</option></select></label>
      </div>
      <div class="grp"><h4>Number format</h4>
        <label class="row">Decimals <select id="kDecimals"><option value="tableau">Use Tableau</option><option value="0">0</option><option value="1">1</option><option value="2">2</option></select></label>
        <label class="row">Thousands separator <span class="sw"><input type="checkbox" id="kThousands"><i></i></span></label>
        <label class="row">Prefix <input type="text" id="kPrefix" style="max-width:90px" placeholder="$"></label>
        <label class="row">Suffix <input type="text" id="kSuffix" style="max-width:90px" placeholder="%"></label>
      </div>
      <div class="grp"><h4>Per-tile</h4>
        <div class="muted" style="margin-bottom:6px">Rename, set a unit, decimals &amp; colour for each measure.</div>
        <div id="tiles"></div>
      </div>
    </div>
    <div class="pfoot" id="pfoot" style="display:none"><button id="pDone">Done</button></div>
  </div>

<script>
"use strict";
(function(){
  const $ = id => document.getElementById(id);
  const DIALOG = new URLSearchParams(location.search).get('dialog')==='1';
  let worksheet=null, lastKpis=null, lastSig='';

  const TOGGLES = [['kThousands','thousands']];
  const RANGES  = [['kMinW','minTileW','px'],['kGap','gap','px'],['kPadding','padding','px'],['kRadius','radius','px'],['kMinH','minHeight','px'],['kNumSize','numSize','px'],['kLabelSize','labelSize','px']];
  const COLORS  = [['kNumColor','numColor'],['kLabelColor','labelColor'],['kTileBg','tileBg'],['kBorder','borderColor'],['kAccent','accentColor']];
  const SELECTS = [['kColumns','columns'],['kAlign','align'],['kFont','fontFamily'],['kLabelCase','labelCase'],['kAccentStyle','accentStyle'],['kDecimals','decimals']];

  /* ---- 6 preset styles (the look bundle; per-tile colours/data untouched) ---- */
  const PRESETS = {
    Card:     {sw:'#fff',                                    o:{tileBg:'#ffffff',borderColor:'#e6e8ee',accentColor:'#4E79A7',accentStyle:'left',numColor:'#16294f',labelColor:'#7a869a',radius:13,padding:14,numSize:32,labelSize:11,minHeight:92}},
    Minimal:  {sw:'#fff',                                    o:{tileBg:'#ffffff',borderColor:'#ffffff',accentColor:'#4E79A7',accentStyle:'none',numColor:'#1d2b3a',labelColor:'#9aa3b0',radius:8, padding:12,numSize:34,labelSize:10,minHeight:84}},
    Outline:  {sw:'#fff',                                    o:{tileBg:'#ffffff',borderColor:'#16294f',accentColor:'#16294f',accentStyle:'none',numColor:'#16294f',labelColor:'#5a6b7d',radius:10,padding:14,numSize:30,labelSize:11,minHeight:90}},
    'Bold dark':{sw:'linear-gradient(180deg,#16294f,#0e1d36)',o:{tileBg:'#16294f',borderColor:'#16294f',accentColor:'#C9A227',accentStyle:'top', numColor:'#ffffff',labelColor:'#9fb0c6',radius:12,padding:15,numSize:34,labelSize:10,minHeight:96}},
    Pastel:   {sw:'#eef2f8',                                 o:{tileBg:'#f5f7fb',borderColor:'#e7ecf4',accentColor:'#4E79A7',accentStyle:'dot', numColor:'#27384c',labelColor:'#8893a4',radius:16,padding:15,numSize:31,labelSize:11,minHeight:94}},
    Compact:  {sw:'#fff',                                    o:{tileBg:'#ffffff',borderColor:'#eceef2',accentColor:'#4E79A7',accentStyle:'top', numColor:'#16294f',labelColor:'#8893a4',radius:8, padding:9, numSize:22,labelSize:9, minHeight:62}},
  };

  const DEFAULTS = {
    preset:'Card', columns:'auto', minTileW:150, gap:12, padding:14, radius:13, minHeight:92, align:'left',
    fontFamily:"'Segoe UI', Tahoma, sans-serif", numSize:32, labelSize:11, labelCase:'upper',
    numColor:'#16294f', labelColor:'#7a869a', tileBg:'#ffffff', borderColor:'#e6e8ee', accentColor:'#4E79A7', accentStyle:'left',
    decimals:'tableau', thousands:true, prefix:'', suffix:'', tiles:{}
  };
  let cfg = JSON.parse(JSON.stringify(DEFAULTS));

  function loadCfg(){ try{ const r=tableau.extensions.settings.get('kpiCfg'); if(r) cfg={...JSON.parse(JSON.stringify(DEFAULTS)),...JSON.parse(r)}; if(!cfg.tiles)cfg.tiles={}; }catch(_){} }
  let saveT=null;
  function saveCfg(){ try{ tableau.extensions.settings.set('kpiCfg', JSON.stringify(cfg));
    clearTimeout(saveT); saveT=setTimeout(()=>{ try{ tableau.extensions.settings.saveAsync(); }catch(_){} }, 250); }catch(_){} }

  /* ================= entry ================= */
  if (DIALOG) initDialog(); else initViz();

  /* ---- viz: renders tiles, opens the native Configure dialog ---- */
  function initViz(){
    tableau.extensions.initializeAsync({ configure: openConfig }).then(()=>{
      worksheet = tableau.extensions.worksheetContent.worksheet;
      loadCfg();
      worksheet.addEventListener(tableau.TableauEventType.SummaryDataChanged, render);
      try{ tableau.extensions.settings.addEventListener(tableau.TableauEventType.SettingsChanged, ()=>{ loadCfg(); redraw(); }); }catch(_){}
      render();
    }).catch(e=>showMsg('Couldn’t start', esc(String(e&&e.message||e))));
  }
  function openConfig(){
    const url = location.href.split('#')[0].split('?')[0] + '?dialog=1';
    let style; try{ style = tableau.DialogStyle.Modeless; }catch(_){ style='modeless'; }
    try{ tableau.extensions.ui.displayDialogAsync(url, 'x', { width:312, height:660, dialogStyle:style }).then(()=>{}).catch(()=>{}); }catch(_){}
  }

  /* ---- dialog: the settings panel (writes settings the viz listens to) ---- */
  function initDialog(){
    document.body.classList.add('dialog');
    tableau.extensions.initializeDialogAsync().then(()=>{
      loadCfg(); buildStyles(); bindControls(); syncControls();
      let fields=[]; try{ fields=JSON.parse(tableau.extensions.settings.get('kpiFields')||'[]'); }catch(_){}
      buildTileEditor(fields);
      $('pfoot').style.display='block';
      const done=()=>{ try{ tableau.extensions.ui.closeDialog('done'); }catch(_){} };
      $('pDone').onclick=done; $('pClose').onclick=done;
    }).catch(e=>{ $('msgText').innerHTML='<b>Dialog error</b>'+esc(String(e&&e.message||e)); });
  }

  /* ================= render ================= */
  async function render(){
    if(!worksheet) return;
    try{
      const dt = await fetchTable(worksheet);
      const numCols = dt.columns.filter(c=>c.dataType==='float'||c.dataType==='int');
      if(!numCols.length) return showMsg('Drop your measures','Put your KPI measures on the <span class="enc">Values</span> shelf — one tile per measure.');
      const kpis = numCols.map(c=>{
        let sum=0,nn=0,fmt=null;
        dt.data.forEach(r=>{ const cell=r[c.index]; const v=cell.value; const num=typeof v==='number'?v:parseFloat(cell.formattedValue);
          if(!isNaN(num)){ sum+=num; nn++; if(fmt===null) fmt=cell.formattedValue; } });
        return { field:c.fieldName, raw: nn? sum/nn : 0, fmt: fmt!==null?fmt:'—' };
      });
      // expose the field list so the Configure dialog can build its per-tile editor
      const sig = kpis.map(k=>k.field).join('|');
      if(sig!==lastSig){ lastSig=sig; try{ tableau.extensions.settings.set('kpiFields', JSON.stringify(kpis.map(k=>k.field))); tableau.extensions.settings.saveAsync(); }catch(_){} }
      drawTiles(kpis);
    }catch(e){ showMsg('Error', esc(String(e&&e.message||e))); }
  }
  async function fetchTable(ws){
    if(ws.getSummaryDataReaderAsync){
      const reader = await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true});
      const dt = await reader.getAllPagesAsync(); await reader.releaseAsync(); return dt;
    }
    return await ws.getSummaryDataAsync({maxRows:5000,ignoreSelection:true});
  }

  /* ================= formatting + draw ================= */
  function fmtNum(raw,dec,th){ let s=(+raw).toFixed(dec); if(th) s=s.replace(/\B(?=(\d{3})+(?!\d))/g,','); return s; }
  function labelCase(s){ if(cfg.labelCase==='upper')return s.toUpperCase(); if(cfg.labelCase==='title')return s.replace(/\w\S*/g,w=>w[0].toUpperCase()+w.slice(1).toLowerCase()); return s; }
  function resolveTile(k){
    const t = cfg.tiles[k.field] || {};
    const name = (t.name && t.name.trim()) ? t.name : labelCase(k.field.replace(/_/g,' '));
    const decRaw = (t.decimals!=null && t.decimals!=='') ? t.decimals : cfg.decimals;
    const suf = (t.suffix!=null && t.suffix!=='') ? t.suffix : cfg.suffix;
    const col = t.color || cfg.accentColor;
    const valBody = (decRaw==='tableau') ? esc(k.fmt) : fmtNum(k.raw, +decRaw||0, cfg.thousands);
    return { name, valBody, suf, col };
  }
  function drawTiles(kpis){
    lastKpis = kpis;
    const grid=$('grid');
    grid.style.gridTemplateColumns = cfg.columns==='auto' ? `repeat(auto-fit,minmax(${cfg.minTileW}px,1fr))` : `repeat(${cfg.columns},minmax(0,1fr))`;
    grid.style.gap = cfg.gap+'px';
    grid.innerHTML = kpis.map(k=>{
      const r=resolveTile(k);
      let st=`background:${cfg.tileBg};border:1px solid ${cfg.borderColor};border-radius:${cfg.radius}px;padding:${cfg.padding}px;min-height:${cfg.minHeight}px;text-align:${cfg.align};font-family:${cfg.fontFamily}`;
      if(cfg.accentStyle==='left') st+=`;border-left:3px solid ${r.col}`;
      if(cfg.accentStyle==='top')  st+=`;border-top:3px solid ${r.col}`;
      const dot = cfg.accentStyle==='dot' ? `<span class="ldot" style="background:${r.col}"></span>` : '';
      const labJ = cfg.align==='center'?'justify-content:center':'';
      const pre = cfg.prefix?`<span class="pre">${esc(cfg.prefix)}</span>`:'';
      const suf = r.suf?`<span class="suf">${esc(r.suf)}</span>`:'';
      return `<div class="tile" style="${st}">
        <div class="lab" style="${labJ};font-size:${cfg.labelSize}px;letter-spacing:.04em;font-weight:600;color:${cfg.labelColor}">${dot}${esc(r.name)}</div>
        <div class="num" style="font-size:${cfg.numSize}px;color:${cfg.numColor}">${pre}${r.valBody}${suf}</div>
      </div>`;
    }).join('');
    grid.classList.remove('hide'); $('msg').classList.add('hide');
  }
  function redraw(){ if(lastKpis) drawTiles(lastKpis); }

  /* ================= dialog controls ================= */
  function buildStyles(){
    const box=$('styles'); box.innerHTML='';
    Object.keys(PRESETS).forEach(name=>{
      const p=PRESETS[name]; const el=document.createElement('div');
      el.className='styt'+(cfg.preset===name?' on':'');
      el.innerHTML=`<span class="sw2" style="background:${p.sw};border:1px solid #e0e0e0"></span>${name}`;
      el.onclick=()=>{ applyPreset(name); };
      box.appendChild(el);
    });
  }
  function applyPreset(name){
    const p=PRESETS[name]; if(!p) return;
    Object.assign(cfg, p.o); cfg.preset=name;
    [...document.querySelectorAll('.styt')].forEach(s=>s.classList.toggle('on', s.textContent.trim()===name));
    syncControls(); saveCfg(); redraw();
  }
  function bindControls(){
    TOGGLES.forEach(([id,k])=>$(id).addEventListener('change',e=>{cfg[k]=e.target.checked;saveCfg();redraw();}));
    RANGES.forEach(([id,k,suf])=>$(id).addEventListener('input',e=>{cfg[k]=+e.target.value;const v=$(id+'V');if(v)v.textContent=e.target.value+suf;saveCfg();redraw();}));
    COLORS.forEach(([id,k])=>$(id).addEventListener('input',e=>{cfg[k]=e.target.value;saveCfg();redraw();}));
    SELECTS.forEach(([id,k])=>$(id).addEventListener('change',e=>{cfg[k]=e.target.value;saveCfg();redraw();}));
    $('kPrefix').addEventListener('input',e=>{cfg.prefix=e.target.value;saveCfg();redraw();});
    $('kSuffix').addEventListener('input',e=>{cfg.suffix=e.target.value;saveCfg();redraw();});
  }
  function syncControls(){
    TOGGLES.forEach(([id,k])=>{const el=$(id);if(el)el.checked=cfg[k];});
    RANGES.forEach(([id,k,suf])=>{const el=$(id);if(el){el.value=cfg[k];const v=$(id+'V');if(v)v.textContent=cfg[k]+suf;}});
    COLORS.forEach(([id,k])=>{const el=$(id);if(el)el.value=cfg[k];});
    SELECTS.forEach(([id,k])=>{const el=$(id);if(el)el.value=cfg[k];});
    if($('kPrefix'))$('kPrefix').value=cfg.prefix; if($('kSuffix'))$('kSuffix').value=cfg.suffix;
  }
  function buildTileEditor(fields){
    const box=$('tiles'); if(!box) return; box.innerHTML='';
    if(!fields.length){ box.innerHTML='<div class="muted">Tiles appear here once measures are on the view.</div>'; return; }
    fields.forEach(field=>{
      const t = cfg.tiles[field] || {};
      const row=document.createElement('div'); row.className='trow';
      row.innerHTML=`<div class="th"><input type="color" class="tc" value="${t.color||cfg.accentColor}"><span class="fn">${esc(field)}</span></div>
        <div class="tg">
          <input class="tn" type="text" placeholder="rename" value="${esc(t.name||'')}">
          <input class="ts" type="text" placeholder="unit" value="${esc(t.suffix||'')}">
          <input class="td" type="number" placeholder="dec" value="${t.decimals!=null?t.decimals:''}">
        </div>`;
      const set=(prop,val)=>{ cfg.tiles[field]=cfg.tiles[field]||{}; cfg.tiles[field][prop]=val; saveCfg(); redraw(); };
      row.querySelector('.tc').addEventListener('input',e=>set('color',e.target.value));
      row.querySelector('.tn').addEventListener('input',e=>set('name',e.target.value));
      row.querySelector('.ts').addEventListener('input',e=>set('suffix',e.target.value));
      row.querySelector('.td').addEventListener('input',e=>set('decimals',e.target.value));
      box.appendChild(row);
    });
  }

  /* ================= utils ================= */
  function showMsg(t,b){ const g=$('grid'); if(g)g.classList.add('hide'); $('msg').classList.remove('hide'); $('msgText').innerHTML='<b>'+esc(t)+'</b>'+(b||''); }
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
})();
</script>
</body>
</html>
