<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Ticker</title>
<script src="tableau.extensions.1.latest.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Spline+Sans+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a1226; --bg2:#0e1b38; --line:rgba(255,255,255,.08); --txt:#eaf0fb; --muted:#8ea0c4;
         --live:#ff4d57; --liveglow:rgba(255,77,87,.55); --win:#48e08a; --gold:#ffce5a; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Archivo',sans-serif;overflow:hidden;background:var(--bg)}

  .bar{position:relative;height:100%;width:100%;display:flex;align-items:stretch;overflow:hidden;
       background:linear-gradient(180deg,var(--bg2),var(--bg));box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .badge{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:0 16px 0 17px;background:linear-gradient(180deg,#1a2747,#121d35);
         border-right:1px solid var(--line);z-index:3;position:relative}
  .badge::after{content:"";position:absolute;right:-1px;top:0;bottom:0;width:18px;background:linear-gradient(90deg,var(--bg2),transparent);pointer-events:none}
  .badge .pulse{width:9px;height:9px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 var(--liveglow);animation:pulse 1.6s infinite}
  .badge b{font:800 12px 'Archivo';letter-spacing:.16em;text-transform:uppercase;color:#fff;white-space:nowrap}
  .badge .ball{font-size:15px}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--liveglow)}70%{box-shadow:0 0 0 9px rgba(255,77,87,0)}100%{box-shadow:0 0 0 0 rgba(255,77,87,0)}}

  .marquee{position:relative;flex:1;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent);
           mask-image:linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent)}
  .track{display:flex;width:max-content;height:100%;align-items:center;will-change:transform;animation:scroll linear infinite}
  .bar:hover .track{animation-play-state:paused}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(calc(var(--shift,1000px) * -1))}}
  .set{display:flex;align-items:center;height:100%}

  .chip{display:inline-flex;align-items:center;gap:8px;padding:0 4px;white-space:nowrap;color:var(--txt)}
  .crest{width:18px;height:18px;object-fit:contain;flex:0 0 auto}
  .chip .tm{font:700 13px 'Archivo';color:#eef3fb}
  .chip .sc{font:700 14px 'Spline Sans Mono';color:#fff;padding:0 2px;letter-spacing:.02em}
  .chip .sc.pre{color:var(--muted);font-weight:600}
  .chip .sc.done{color:#b9c4d8}
  .chip .st{display:inline-flex;align-items:center;gap:5px;font:700 11px 'Spline Sans Mono';padding:2px 8px;border-radius:999px}
  .chip .st.live{color:#fff;background:rgba(255,77,87,.16)}
  .chip .st.live .d{width:6px;height:6px;border-radius:50%;background:var(--live);box-shadow:0 0 7px var(--liveglow);animation:blink 1.1s infinite}
  .chip .st.done{color:#8ea0c4;background:rgba(255,255,255,.06)}
  .chip .st.pre{color:#9fb0cd;background:rgba(90,160,255,.12)}
  @keyframes blink{50%{opacity:.35}}
  .sep{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);margin:0 15px}
</style>
</head>
<body>
  <div class="bar" id="bar">
    <div class="badge"><span class="ball">&#127942;</span><span class="pulse"></span><b>World Cup</b></div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </div>

<script>
"use strict";
(function(){
  // Best-effort Tableau handshake — lets it run as a dashboard extension; harmless when opened standalone.
  try{ if(window.tableau && tableau.extensions && tableau.extensions.initializeAsync){ tableau.extensions.initializeAsync().then(function(){}).catch(function(){}); } }catch(_){}

  var LEAGUE = 'fifa.world';   // FIFA World Cup
  var ESC = function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
  var track=document.getElementById('track'), bar=document.getElementById('bar');

  function fetchWC(){
    return fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/'+LEAGUE+'/scoreboard')
      .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
      .then(function(j){
        return (j.events||[]).map(function(ev){
          var comp = ev.competitions && ev.competitions[0]; if(!comp) return null;
          var cs = comp.competitors||[];
          var home = cs.filter(function(c){return c.homeAway==='home';})[0]||cs[0]||{};
          var away = cs.filter(function(c){return c.homeAway==='away';})[0]||cs[1]||{};
          var st = (ev.status&&ev.status.type)||{};
          var when=''; try{ when=new Date(ev.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }catch(_){}
          return {
            home:(home.team&&(home.team.abbreviation||home.team.shortDisplayName))||'?',
            away:(away.team&&(away.team.abbreviation||away.team.shortDisplayName))||'?',
            homeLogo:home.team&&home.team.logo, awayLogo:away.team&&away.team.logo,
            hs:home.score, as:away.score, state:st.state||'pre',
            detail:st.shortDetail||when||'', when:when
          };
        }).filter(Boolean);
      });
  }

  function chip(m){
    var live=m.state==='in', done=m.state==='post', pre=m.state==='pre';
    var cls = live?'live':done?'done':'pre';
    var score = pre ? '<span class="sc pre">v</span>' : '<span class="sc '+cls+'">'+ESC(m.hs)+'–'+ESC(m.as)+'</span>';
    var statusTxt = live ? ESC(m.detail) : done ? 'FT' : ESC(m.when||m.detail);
    var statusEl = '<span class="st '+cls+'">'+(live?'<i class="d"></i>':'')+statusTxt+'</span>';
    var crest = function(u){ return u ? '<img class="crest" src="'+ESC(u)+'" onerror="this.style.display=\'none\'">' : ''; };
    return '<span class="chip">'+crest(m.homeLogo)+'<b class="tm">'+ESC(m.home)+'</b>'+score+'<b class="tm">'+ESC(m.away)+'</b>'+crest(m.awayLogo)+statusEl+'</span>';
  }

  var SEP = '<span class="sep"></span>';
  var rank = function(m){ return m.state==='in'?0 : m.state==='pre'?1 : 2; };

  function lay(items){
    var unit = items.map(chip).join(SEP) + SEP;
    track.innerHTML = '<div class="set">'+unit+'</div>';
    var setW = track.querySelector('.set').getBoundingClientRect().width || 1;
    var need = Math.max(2, Math.ceil((bar.clientWidth*2)/setW)+1);
    var html=''; for(var i=0;i<need;i++) html+='<div class="set">'+unit+'</div>';
    track.innerHTML = html;
    setW = track.querySelector('.set').getBoundingClientRect().width || setW;
    track.style.setProperty('--shift', setW+'px');
    track.style.animationDuration = Math.max(8,(setW/80)).toFixed(1)+'s';
  }

  var FALLBACK = [
    {home:'ARG',away:'FRA',hs:'4',as:'2',state:'post',detail:'FT',when:''},
    {home:'BRA',away:'GER',hs:'1',as:'1',state:'in',detail:"72'",when:''},
    {home:'ENG',away:'ESP',hs:'',as:'',state:'pre',detail:'',when:'21:00'},
    {home:'NED',away:'USA',hs:'2',as:'1',state:'post',detail:'FT',when:''},
    {home:'POR',away:'MAR',hs:'',as:'',state:'pre',detail:'',when:'18:00'}
  ];

  function load(){
    fetchWC().then(function(all){
      if(!all.length) all = FALLBACK;
      all.sort(function(a,b){ return rank(a)-rank(b); });
      lay(all);
    }).catch(function(){ lay(FALLBACK); });
  }

  load();
  setInterval(load, 60000);
  var rt=null; window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(load,300); });
})();
</script>
</body>
</html>
