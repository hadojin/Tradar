<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Header (Viz)</title>
<script src="tableau.extensions.1.latest.min.js"></script>
<style>
  :root{ --blue:#4E79A7; --blue-deep:#3B5E84; --ink:#2b2b2b; --muted:#7a7a7a; --line:#e6e6e6; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',Tahoma,sans-serif;color:var(--ink);background:#fff;display:flex;overflow:hidden}
  #stage{flex:1;position:relative;display:flex;min-height:0}
  #hdr{flex:1;position:relative;display:flex;align-items:center;justify-content:space-between;gap:24px;overflow:hidden}
  #msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;background:#fff}
  .msg{text-align:center;color:var(--muted);font:400 13px 'Segoe UI';max-width:360px;line-height:1.55}
  .msg b{color:var(--ink);display:block;margin-bottom:6px;font:600 14px 'Segoe UI'}
  .msg .enc{color:var(--blue-deep);font-weight:600}
  .hide{display:none!important}

  .h-left{position:relative;z-index:2;min-width:0}
  .h-eyebrow{font-weight:700;letter-spacing:.22em;margin-bottom:11px}
  .h-name{line-height:.98;letter-spacing:-.015em;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .h-sub{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-weight:600;padding:6px 12px;border-radius:999px;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .pill .mono{font-family:'Spline Sans Mono','Consolas',monospace}
  .gdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .h-right{position:relative;z-index:2;text-align:right;flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end}
  .h-score{line-height:.82;font-weight:800;letter-spacing:-.02em}
  .h-score .of{font-weight:600;opacity:.55}
  .h-badges{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap}
  .spectrum{position:absolute;left:0;right:0;bottom:0;height:4px;z-index:1;background:linear-gradient(90deg,#4E79A7,#59A14F,#B07AA1,#F28E2B,#E15759)}

  body.dialog{display:block}
  body.dialog #stage{display:none}
  #panel{display:none}
  body.dialog #panel{display:flex;flex-direction:column;height:100vh}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .phead h3{font:700 13px 'Segoe UI'}
  .phead .x{cursor:pointer;color:#999;font-size:18px;border:0;background:none}
  .tabs{display:flex;gap:1px;padding:7px 8px 0;border-bottom:1px solid var(--line);flex:0 0 auto;overflow-x:auto}
  .tabs button{font:600 11px 'Segoe UI';color:#888;background:none;border:0;padding:8px 9px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tabs button.on{color:var(--blue-deep);border-bottom-color:var(--blue)}
  .pbody{overflow-y:auto;padding:8px 14px 18px;flex:1 1 auto}
  .tab{display:none} .tab.on{display:block}
  .grp{margin-top:6px}
  .grp h4{font:700 9.5px 'Segoe UI';letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px dashed var(--line)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;font:500 12px 'Segoe UI';color:#333}
  .row.col{flex-direction:column;align-items:stretch;gap:4px}
  .row input[type=range]{width:120px}
  .row input[type=text]{font:500 12px 'Segoe UI';padding:5px 7px;border:1px solid #cfcfcf;border-radius:5px;width:100%}
  .row input[type=color]{width:30px;height:22px;border:1px solid #cfcfcf;border-radius:5px;padding:0;background:#fff;cursor:pointer}
  .row select{font:500 12px 'Segoe UI';padding:4px 6px;border:1px solid #cfcfcf;border-radius:5px;background:#fff;cursor:pointer}
  .sw{position:relative;width:34px;height:19px;flex:0 0 auto;cursor:pointer}
  .sw input{display:none}
  .sw i{position:absolute;inset:0;background:#d2d2d2;border-radius:999px;transition:background .16s}
  .sw i::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .16s}
  .sw input:checked + i{background:var(--blue)}
  .sw input:checked + i::after{transform:translateX(15px)}
  .muted{color:var(--muted);font-size:11px;font-weight:400}
  .styles{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
  .styt{border:1px solid var(--line);border-radius:8px;padding:8px;cursor:pointer;font:600 11px 'Segoe UI';color:#555}
  .styt.on{border-color:var(--blue);box-shadow:0 0 0 2px rgba(78,121,167,.15)}
  .styt .sw2{display:block;height:20px;border-radius:5px;margin-bottom:5px}
  .frow{border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:7px}
  .frow .fn{font:600 11px 'Consolas',monospace;color:#777;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .frow .fg{display:grid;grid-template-columns:1fr 84px 50px;gap:5px}
  .frow input,.frow select{font:500 11px 'Segoe UI';padding:4px 6px;border:1px solid #d6d6d6;border-radius:4px;width:100%}
  .pfoot{flex:0 0 auto;padding:10px 14px;border-top:1px solid var(--line)}
  .pfoot button{width:100%;font:600 13px 'Segoe UI';color:#fff;background:var(--blue);border:0;border-radius:6px;padding:10px;cursor:pointer}
</style>
</head>
<body>
  <div id="stage">
    <div id="hdr" class="hide"></div>
    <div id="msg"><div class="msg" id="msgText"><b>Loading…</b>Starting the header.</div></div>
  </div>

  <div id="panel">
    <div class="phead"><h3>Header settings</h3><button class="x" id="pClose">&times;</button></div>
    <div class="tabs" id="tabs">
      <button class="on" data-t="fields">Fields</button>
      <button data-t="style">Style</button>
      <button data-t="bg">Background</button>
      <button data-t="colour">Colour</button>
      <button data-t="layout">Layout</button>
    </div>
    <div class="pbody">
      <div class="tab on" id="t-fields"><div class="grp"><h4>Fields</h4>
        <div class="muted" style="margin-bottom:7px">Name &amp; Score are fixed. For every other field set its role (Eyebrow / Tag / Badge / Hide), rename it, and add a unit.</div>
        <div id="fields"></div>
      </div></div>

      <div class="tab" id="t-style"><div class="grp"><h4>Style preset</h4><div class="styles" id="styles"></div></div></div>

      <div class="tab" id="t-bg"><div class="grp"><h4>Background</h4>
        <label class="row">Style <select id="hBgStyle"><option value="gradient">Gradient</option><option value="solid">Solid</option></select></label>
        <label class="row">Colour 1 <input type="color" id="hBg1"></label>
        <label class="row">Colour 2 <input type="color" id="hBg2"></label>
        <label class="row">Pillar accent line <span class="sw"><input type="checkbox" id="hSpectrum"><i></i></span></label>
      </div></div>

      <div class="tab" id="t-colour"><div class="grp"><h4>Colours</h4>
        <label class="row">Name / text <input type="color" id="hText"></label>
        <label class="row">Sub / eyebrow <input type="color" id="hSub"></label>
        <label class="row">Score <input type="color" id="hScoreColor"></label>
        <label class="row">Badge background <input type="color" id="hBadgeBg"></label>
        <label class="row">Badge text <input type="color" id="hBadgeText"></label>
      </div></div>

      <div class="tab" id="t-layout"><div class="grp"><h4>Sizes &amp; layout</h4>
        <div class="row col"><span>Name size <span class="muted" id="hNameSizeV"></span></span><input type="range" id="hNameSize" min="20" max="72" step="1"></div>
        <div class="row col"><span>Score size <span class="muted" id="hScoreSizeV"></span></span><input type="range" id="hScoreSize" min="36" max="130" step="2"></div>
        <div class="row col"><span>Suffix size (the /100) <span class="muted" id="hSuffixSizeV"></span></span><input type="range" id="hSuffixSize" min="8" max="90" step="1"></div>
        <div class="row col"><span>Padding <span class="muted" id="hPadV"></span></span><input type="range" id="hPad" min="14" max="56" step="2"></div>
        <div class="row col"><span>Corner radius <span class="muted" id="hRadiusV"></span></span><input type="range" id="hRadius" min="0" max="32" step="1"></div>
        <label class="row">Score side <select id="hScoreSide"><option value="right">Right</option><option value="left">Left</option></select></label>
        <label class="row">Font <select id="hFont">
          <option value="'Segoe UI', Tahoma, sans-serif">Segoe UI</option>
          <option value="Georgia, 'Times New Roman', serif">Georgia</option>
          <option value="'Benton Sans','Segoe UI',sans-serif">Benton Sans</option>
          <option value="Arial, Helvetica, sans-serif">Arial</option></select></label>
      </div>
      <div class="grp"><h4>Numbers</h4>
        <label class="row">Decimals <select id="hDecimals"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="tableau">Use Tableau</option></select></label>
        <label class="row">Score suffix <input type="text" id="hScoreMax" style="max-width:80px" placeholder="/100"></label>
        <label class="row">Eyebrow UPPERCASE <span class="sw"><input type="checkbox" id="hEyebrowUpper"><i></i></span></label>
        <label class="row">Confidence dot on field <input type="text" id="hConfMatch" style="max-width:90px" placeholder="conf"></label>
      </div></div>
    </div>
    <div class="pfoot" id="pfoot" style="display:none"><button id="pDone">Done</button></div>
  </div>

<script>
"use strict";
(function(){
  const $ = id => document.getElementById(id);
  const DIALOG = new URLSearchParams(location.search).get('dialog')==='1';
  let worksheet=null, last=null, lastFields=[];

  const RANGES = [['hNameSize','nameSize','px'],['hScoreSize','scoreSize','px'],['hSuffixSize','suffixSize','px'],['hPad','padding','px'],['hRadius','radius','px']];
  const COLORS = [['hBg1','bg1'],['hBg2','bg2'],['hText','textColor'],['hSub','subColor'],['hScoreColor','scoreColor'],['hBadgeBg','badgeBg'],['hBadgeText','badgeText']];
  const SELECTS= [['hBgStyle','bgStyle'],['hScoreSide','scoreSide'],['hFont','fontFamily'],['hDecimals','decimals']];
  const TOGGLES= [['hSpectrum','spectrum'],['hEyebrowUpper','eyebrowUpper']];
  const TEXTS  = [['hScoreMax','scoreMax'],['hConfMatch','confMatch']];

  const PRESETS = {
    'Navy gold':{sw:'linear-gradient(135deg,#0C1E36,#102845)',o:{bgStyle:'gradient',bg1:'#0C1E36',bg2:'#102845',textColor:'#ffffff',subColor:'#E7D5A8',scoreColor:'#C9A227',badgeBg:'#1b3454',badgeText:'#dfe6f0',spectrum:true}},
    'Navy white':{sw:'linear-gradient(135deg,#13294d,#0e1f3b)',o:{bgStyle:'gradient',bg1:'#13294d',bg2:'#0e1f3b',textColor:'#ffffff',subColor:'#9fb0c6',scoreColor:'#ffffff',badgeBg:'#1e3a56',badgeText:'#dfe6f0',spectrum:false}},
    'Slate':{sw:'linear-gradient(135deg,#27313b,#1a222b)',o:{bgStyle:'gradient',bg1:'#27313b',bg2:'#1a222b',textColor:'#f1f4f7',subColor:'#9fb0bd',scoreColor:'#7FB8D6',badgeBg:'#34404c',badgeText:'#e3eaef',spectrum:true}},
    'Light':{sw:'#ffffff',o:{bgStyle:'solid',bg1:'#ffffff',bg2:'#ffffff',textColor:'#16294f',subColor:'#8A6417',scoreColor:'#B5872A',badgeBg:'#f1f0ea',badgeText:'#16294f',spectrum:true}},
    'Ink':{sw:'linear-gradient(135deg,#14151a,#0c0d11)',o:{bgStyle:'gradient',bg1:'#14151a',bg2:'#0c0d11',textColor:'#f4f4f5',subColor:'#C9A227',scoreColor:'#C9A227',badgeBg:'#23242b',badgeText:'#e6e6e8',spectrum:false}},
  };

  const DEFAULTS = {
    preset:'Navy gold', bgStyle:'gradient', bg1:'#0C1E36', bg2:'#102845', spectrum:true,
    textColor:'#ffffff', subColor:'#E7D5A8', scoreColor:'#C9A227', badgeBg:'#1b3454', badgeText:'#dfe6f0',
    nameSize:46, scoreSize:84, suffixSize:30, padding:30, radius:18, scoreSide:'right',
    fontFamily:"'Segoe UI', Tahoma, sans-serif", decimals:'0', scoreMax:'/100', eyebrowUpper:true, confMatch:'conf',
    fields:{}
  };
  let cfg = JSON.parse(JSON.stringify(DEFAULTS));

  function loadCfg(){ try{ const r=tableau.extensions.settings.get('hdrCfg'); if(r) cfg={...JSON.parse(JSON.stringify(DEFAULTS)),...JSON.parse(r)}; if(!cfg.fields)cfg.fields={}; }catch(_){} }
  let saveT=null;
  function saveCfg(){ if(DIALOG) return; try{ tableau.extensions.settings.set('hdrCfg', JSON.stringify(cfg));
    clearTimeout(saveT); saveT=setTimeout(()=>{ try{ tableau.extensions.settings.saveAsync(); }catch(_){} },250); }catch(_){} }

  if (DIALOG) initDialog(); else initViz();

  function initViz(){
    tableau.extensions.initializeAsync({ configure: openConfig }).then(()=>{
      worksheet = tableau.extensions.worksheetContent.worksheet;
      loadCfg();
      worksheet.addEventListener(tableau.TableauEventType.SummaryDataChanged, render);
      render();
    }).catch(e=>showMsg('Couldn’t start', esc(String(e&&e.message||e))));
  }
  function openConfig(){
    const url = location.href.split('#')[0].split('?')[0] + '?dialog=1';
    let style; try{ style=tableau.DialogStyle.Modal; }catch(_){ style='modal'; }
    const payload = JSON.stringify({ cfg:cfg, fields:lastFields });
    tableau.extensions.ui.displayDialogAsync(url, payload, {width:330,height:560,dialogStyle:style})
      .then(cp=>{ try{ if(cp){ cfg={...JSON.parse(JSON.stringify(DEFAULTS)),...JSON.parse(cp)}; if(!cfg.fields)cfg.fields={}; saveCfg(); redraw(); } }catch(_){} })
      .catch(()=>{});
  }
  function initDialog(){
    document.body.classList.add('dialog');
    tableau.extensions.initializeDialogAsync().then(payload=>{
      let fl=[]; try{ const o=JSON.parse(payload); if(o&&o.cfg) cfg={...JSON.parse(JSON.stringify(DEFAULTS)),...o.cfg}; if(o&&o.fields) fl=o.fields; }catch(_){}
      if(!cfg.fields)cfg.fields={};
      buildStyles(); bindControls(); syncControls(); initTabs(); buildFieldEditor(fl);
      $('pfoot').style.display='block';
      const done=()=>{ try{ tableau.extensions.ui.closeDialog(JSON.stringify(cfg)); }catch(_){} };
      $('pDone').onclick=done; $('pClose').onclick=done;
    }).catch(e=>{ $('msgText').innerHTML='<b>Dialog error</b>'+esc(String(e&&e.message||e)); });
  }
  function initTabs(){
    const btns=[...document.querySelectorAll('#tabs button')];
    btns.forEach(b=>b.onclick=()=>{ btns.forEach(x=>x.classList.toggle('on',x===b));
      document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.id==='t-'+b.dataset.t)); });
  }

  /* ---------- render: read summary columns directly (robust to multi-field) ---------- */
  async function render(){
    if(!worksheet) return;
    try{
      const spec = await worksheet.getVisualSpecificationAsync();
      const marks = spec.marksSpecifications[spec.activeMarksSpecificationIndex];
      let nameF=null, scoreF=null;
      (marks.encodings||[]).forEach(enc=>{
        const f = enc.field || (enc.fields && enc.fields[0]); if(!f) return;
        if(enc.id==='name') nameF=f.name; else if(enc.id==='score') scoreF=f.name;
      });
      const dt = await fetchTable(worksheet);
      if(!dt.data.length) return showMsg('No data','Filter the sheet to one agent.');
      const row=dt.data[0];
      const cell=ci=>{ const c=row[ci]; return { fmt:c.formattedValue, raw: typeof c.value==='number'?c.value:parseFloat(c.formattedValue) }; };
      const isNum=c=>c.dataType==='float'||c.dataType==='int';
      // fall back: name = first string col, score = first measure col
      if(!nameF){ const c=dt.columns.find(c=>!isNum(c)); nameF=c&&c.fieldName; }
      if(!scoreF){ const c=dt.columns.find(c=>isNum(c)); scoreF=c&&c.fieldName; }
      const nameCol = dt.columns.find(c=>c.fieldName===nameF);
      const scoreCol = dt.columns.find(c=>c.fieldName===scoreF);
      if(!nameCol || !scoreCol) return showMsg('Assign Name &amp; Score','Put a dimension on <span class="enc">Name</span> and a measure on <span class="enc">Score</span>.');

      const others = dt.columns.filter(c=>c.fieldName!==nameF && c.fieldName!==scoreF);
      lastFields = others.map(c=>({field:c.fieldName, num:isNum(c)}));   // for the dialog editor (passed via payload)

      let firstStr=true;
      const items = others.map(c=>{
        const ov = cfg.fields[c.fieldName] || {};
        const num = isNum(c);
        let role = ov.role; if(!role){ role = num ? 'badge' : (firstStr ? 'eyebrow' : 'tag'); }
        if(role==='eyebrow') firstStr=false;
        return { field:c.fieldName, num, role, label: ov.name || clean(c.fieldName), unit: ov.unit||'', ...cell(c.index) };
      });
      draw({ name:cell(nameCol.index), score:cell(scoreCol.index), items });
    }catch(e){ showMsg('Error', esc(String(e&&e.message||e))); }
  }
  async function fetchTable(ws){
    if(ws.getSummaryDataReaderAsync){ const rd=await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true}); const dt=await rd.getAllPagesAsync(); await rd.releaseAsync(); return dt; }
    return await ws.getSummaryDataAsync({maxRows:50,ignoreSelection:true});
  }

  /* ---------- formatting + draw ---------- */
  function clean(f){ return String(f).replace(/^[A-Za-z]+\((.*)\)$/,'$1').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim(); }
  function fmtVal(it){ if(cfg.decimals==='tableau' || isNaN(it.raw)) return it.fmt;
    return (Math.round(it.raw*Math.pow(10,+cfg.decimals))/Math.pow(10,+cfg.decimals)).toFixed(+cfg.decimals); }
  function confColor(v){ return v>=80?'#3F8F63':v>=50?'#C9A227':'#C2410C'; }
  function pill(html){ return `<span class="pill" style="background:${cfg.badgeBg};color:${cfg.badgeText}">${html}</span>`; }

  function draw(v){
    const bg = cfg.bgStyle==='gradient' ? `linear-gradient(135deg,${cfg.bg1},${cfg.bg2})` : cfg.bg1;
    const cm = (cfg.confMatch||'').toLowerCase();
    const eyebrowTxt = v.items.filter(i=>i.role==='eyebrow').map(i=>esc(i.fmt)).join('  ·  ');
    const tags = v.items.filter(i=>i.role==='tag').map(i=>pill(`<b class="mono">${esc(i.fmt)}</b>`)).join('');
    const badges = v.items.filter(i=>i.role==='badge').map(i=>{
      const isConf = cm && i.field.toLowerCase().includes(cm) && !isNaN(i.raw);
      const dot = isConf ? `<span class="gdot" style="background:${confColor(i.raw)}"></span>` : '';
      const val = i.num ? fmtVal(i) : esc(i.fmt);
      return pill(`${dot}${esc(i.label)} <span class="mono">${val}${esc(i.unit)}</span>`);
    }).join('');

    const eyebrow = eyebrowTxt ? `<div class="h-eyebrow" style="color:${cfg.subColor};font-size:${Math.max(10,Math.round(cfg.nameSize*0.23))}px;text-transform:${cfg.eyebrowUpper?'uppercase':'none'}">${eyebrowTxt}</div>` : '';
    const left = `<div class="h-left">${eyebrow}<div class="h-name" style="color:${cfg.textColor};font-size:${cfg.nameSize}px">${esc(v.name.fmt)}</div>${tags?`<div class="h-sub">${tags}</div>`:''}</div>`;
    const right = `<div class="h-right"><div class="h-score" style="color:${cfg.scoreColor};font-size:${cfg.scoreSize}px">${fmtVal(v.score)}${cfg.scoreMax?`<span class="of" style="font-size:${cfg.suffixSize}px">${esc(cfg.scoreMax)}</span>`:''}</div>${badges?`<div class="h-badges">${badges}</div>`:''}</div>`;

    const hdr=$('hdr');
    hdr.style.cssText=`background:${bg};border-radius:${cfg.radius}px;padding:${cfg.padding}px ${cfg.padding+8}px;font-family:${cfg.fontFamily}`;
    hdr.innerHTML = (cfg.scoreSide==='left' ? right+left : left+right) + (cfg.spectrum?'<div class="spectrum"></div>':'');
    hdr.classList.remove('hide'); $('msg').classList.add('hide'); last=v;
  }
  function redraw(){ if(last) draw(last); }

  /* ---------- field editor ---------- */
  function buildFieldEditor(fl){
    const box=$('fields'); if(!box) return; box.innerHTML='';
    if(!fl.length){ box.innerHTML='<div class="muted">Fields appear here once you drop them on Metrics, Context (or Detail).</div>'; return; }
    let firstStr=true;
    fl.forEach(f=>{
      const ov=cfg.fields[f.field]||{};
      const defRole = ov.role || (f.num ? 'badge' : (firstStr?'eyebrow':'tag'));
      if(defRole==='eyebrow') firstStr=false;
      const row=document.createElement('div'); row.className='frow';
      row.innerHTML=`<div class="fn">${esc(f.field)}</div>
        <div class="fg">
          <select class="fr">
            <option value="badge">Badge</option><option value="eyebrow">Eyebrow</option><option value="tag">Tag</option><option value="hide">Hide</option>
          </select>
          <input class="fnm" type="text" placeholder="rename" value="${esc(ov.name||'')}">
          <input class="fu" type="text" placeholder="unit" value="${esc(ov.unit||'')}">
        </div>`;
      row.querySelector('.fr').value = defRole;
      const set=(p,val)=>{ cfg.fields[f.field]=cfg.fields[f.field]||{}; cfg.fields[f.field][p]=val; saveCfg(); redraw(); };
      row.querySelector('.fr').addEventListener('change',e=>set('role',e.target.value));
      row.querySelector('.fnm').addEventListener('input',e=>set('name',e.target.value));
      row.querySelector('.fu').addEventListener('input',e=>set('unit',e.target.value));
      box.appendChild(row);
    });
  }

  function buildStyles(){
    const box=$('styles'); box.innerHTML='';
    Object.keys(PRESETS).forEach(name=>{ const p=PRESETS[name]; const el=document.createElement('div');
      el.className='styt'+(cfg.preset===name?' on':'');
      el.innerHTML=`<span class="sw2" style="background:${p.sw}"></span>${name}`;
      el.onclick=()=>applyPreset(name); box.appendChild(el); });
  }
  function applyPreset(name){ const p=PRESETS[name]; if(!p)return; Object.assign(cfg,p.o); cfg.preset=name;
    [...document.querySelectorAll('.styt')].forEach(s=>s.classList.toggle('on', s.textContent.trim()===name));
    syncControls(); saveCfg(); redraw(); }
  function bindControls(){
    RANGES.forEach(([id,k,suf])=>$(id).addEventListener('input',e=>{cfg[k]=+e.target.value;const v=$(id+'V');if(v)v.textContent=e.target.value+suf;saveCfg();redraw();}));
    COLORS.forEach(([id,k])=>$(id).addEventListener('input',e=>{cfg[k]=e.target.value;saveCfg();redraw();}));
    SELECTS.forEach(([id,k])=>$(id).addEventListener('change',e=>{cfg[k]=e.target.value;saveCfg();redraw();}));
    TOGGLES.forEach(([id,k])=>$(id).addEventListener('change',e=>{cfg[k]=e.target.checked;saveCfg();redraw();}));
    TEXTS.forEach(([id,k])=>$(id).addEventListener('input',e=>{cfg[k]=e.target.value;saveCfg();redraw();}));
  }
  function syncControls(){
    RANGES.forEach(([id,k,suf])=>{const el=$(id);if(el){el.value=cfg[k];const v=$(id+'V');if(v)v.textContent=cfg[k]+suf;}});
    COLORS.forEach(([id,k])=>{const el=$(id);if(el)el.value=cfg[k];});
    SELECTS.forEach(([id,k])=>{const el=$(id);if(el)el.value=cfg[k];});
    TOGGLES.forEach(([id,k])=>{const el=$(id);if(el)el.checked=cfg[k];});
    TEXTS.forEach(([id,k])=>{const el=$(id);if(el)el.value=cfg[k];});
  }

  function showMsg(t,b){ const h=$('hdr'); if(h)h.classList.add('hide'); $('msg').classList.remove('hide'); $('msgText').innerHTML='<b>'+t+'</b>'+(b||''); }
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
})();
</script>
</body>
</html>
